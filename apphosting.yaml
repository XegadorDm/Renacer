# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Instancias mínimas para evitar "cold starts" y máximas para controlar costos.
  minInstances: 0
  maxInstances: 2
  # Memoria recomendada para una aplicación Next.js con Genkit
  memory: 512Mi
  cpu: 1

# Si decides usar secretos para la API de Resend, se configurarían así en la consola:
# env:
#   - variable: RESEND_API_KEY
#     secret: RESEND_API_KEY_SECRET
